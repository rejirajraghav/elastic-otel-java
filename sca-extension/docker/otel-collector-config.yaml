# ============================================================
# otel-collector-config.yaml
# EDOT Collector (elastic/elastic-agent in OTel mode)
#
# Signal flow:
#   EDOT Java agent → OTLP/HTTP :4318 → this collector → Elasticsearch
#
# SCA events are OTel log records emitted by the sca-extension
# instrumentation scope "co.elastic.otel.sca". They land in the
# logs pipeline and are indexed into logs-generic.otel-default.
#
# All SCA attributes land at:   attributes.<key>
# Resource attributes land at:  resource.attributes.<key>
#
# Key SCA fields in Elasticsearch:
#   attributes.library.name          — artifact name
#   attributes.library.version       — version string
#   attributes.library.group_id      — Maven groupId
#   attributes.library.purl          — pkg:maven/group/artifact@version
#   attributes.library.sha256        — hex SHA-256 of JAR bytes
#   attributes.library.checksum.sha256
#   attributes.library.sha1          — hex SHA-1 of JAR bytes (NEW)
#   attributes.library.checksum.sha1                               (NEW)
#   attributes.library.license       — SPDX identifier (NEW, conditional)
#   attributes.library.shaded        — true for uber-JAR entries (NEW)
#   attributes.library.module_type   — jar/nested-jar/shaded-entry/jpms-module (NEW)
#   attributes.library.path          — absolute JAR path
#   attributes.library.classloader   — classloader class name
#   attributes.event.name            — co.elastic.otel.sca.library.loaded
# ============================================================

receivers:
  # Receives traces, metrics, and logs from the EDOT Java agent
  otlp/fromsdk:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318    # EDOT Java default (http/protobuf)

processors:
  # Batch before exporting — improves throughput and reduces API calls.
  # SCA emits many events at startup (one per JAR), so batching is important.
  batch:
    send_batch_size: 200
    timeout: 5s

  # Enrich all signals with host-level resource attributes (host.name,
  # os.type, os.description, host.arch). These appear on SCA events as
  # resource.attributes.host.name in Elasticsearch, complementing the
  # host.name already emitted by the SCA extension's ResourceContext.
  resourcedetection:
    detectors: ["system"]
    system:
      hostname_sources: ["os"]
      resource_attributes:
        host.name:
          enabled: true
        host.arch:
          enabled: true
        os.description:
          enabled: true
        os.type:
          enabled: true

  # Elastic APM processor — enriches spans with APM-specific fields
  # required for Kibana Service Map and Topology to work.
  elasticapm:

connectors:
  # Elastic APM connector — receives traces/logs and generates
  # aggregated APM metrics (transaction duration, error rate, etc.)
  # that power Kibana Service Map, service topology, and latency charts.
  elasticapm:

exporters:
  # Elasticsearch with native OTel mapping.
  # All signals land in *-generic.otel-* indices.
  # mode: otel ensures attributes.<key> mapping (no flattening).
  elasticsearch/otel:
    endpoints: [ "${env:ELASTIC_ENDPOINT}" ]
    api_key: ${env:ELASTIC_API_KEY}
    mapping:
      mode: otel
    # Retry on transient Elasticsearch errors (5xx, rate limits).
    retry:
      enabled: true
      initial_interval: 1s
      max_interval: 30s

  # Debug exporter — prints a summary line per record to collector stdout.
  # Useful to confirm SCA events are flowing before checking Kibana.
  # Change verbosity to "detailed" temporarily to see all attribute values.
  debug:
    verbosity: basic

service:
  pipelines:
    # Traces: enrich → fan-out to APM connector + Elasticsearch
    traces/fromsdk:
      receivers: [otlp/fromsdk]
      processors: [resourcedetection, elasticapm, batch]
      exporters: [elasticapm, elasticsearch/otel]

    # SDK metrics: enrich → Elasticsearch
    metrics/fromsdk:
      receivers: [otlp/fromsdk]
      processors: [resourcedetection, batch]
      exporters: [elasticsearch/otel]

    # Aggregated APM metrics generated by the elasticapm connector
    # (transaction duration histograms, service throughput, error rates)
    metrics/aggregated-metrics:
      receivers: [elasticapm]
      processors: [batch]
      exporters: [elasticsearch/otel]

    # Logs + SCA library-loaded events.
    # resourcedetection enriches with host.arch / os.type so SCA events
    # carry full platform context alongside the SCA-emitted host.name.
    # debug exporter prints each SCA event to collector stdout — remove
    # it (or set verbosity: none) once you have confirmed events in Kibana.
    logs/fromsdk:
      receivers: [otlp/fromsdk]
      processors: [resourcedetection, batch]
      exporters: [elasticapm, elasticsearch/otel, debug]

  telemetry:
    logs:
      level: info
