# ============================================================
# otel-collector-config.yaml
# EDOT Collector (elastic/elastic-agent in OTel mode)
#
# Based on the official Elastic EDOT gateway configuration.
# Requires elastic/elastic-agent image — the elasticapm connector
# and processor are Elastic extensions not in the contrib image.
#
# Required environment variables:
#   ELASTIC_ENDPOINT  – Elasticsearch URL
#   ELASTIC_API_KEY   – Elasticsearch API key
# ============================================================

receivers:
  # Receives traces, metrics, and logs from the EDOT Java agent
  otlp/fromsdk:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318    # EDOT Java default (http/protobuf)

processors:
  resourcedetection:
    detectors: ["system"]
    system:
      hostname_sources: ["os"]
      resource_attributes:
        host.name:
          enabled: true
        host.arch:
          enabled: true
        os.description:
          enabled: true
        os.type:
          enabled: true

  # Elastic APM processor — enriches spans with APM-specific fields
  # required for Kibana Service Map and Topology to work
  elasticapm:

connectors:
  # Elastic APM connector — receives traces/logs and generates
  # aggregated APM metrics (transaction duration, error rate, etc.)
  # that power Kibana Service Map, service topology, and latency charts
  elasticapm:

exporters:
  # Elasticsearch with native OTel mapping
  # All signals land in *-generic.otel-* indices
  elasticsearch/otel:
    endpoints: [ "${env:ELASTIC_ENDPOINT}" ]
    api_key: ${env:ELASTIC_API_KEY}
    mapping:
      mode: otel

  debug:
    verbosity: basic

service:
  pipelines:
    # Traces: enrich with elasticapm processor, fan-out to connector + ES
    traces/fromsdk:
      receivers: [otlp/fromsdk]
      processors: [elasticapm]
      exporters: [elasticapm, elasticsearch/otel]

    # SDK metrics: direct to ES
    metrics/fromsdk:
      receivers: [otlp/fromsdk]
      processors: []
      exporters: [elasticsearch/otel]

    # Aggregated APM metrics generated by the elasticapm connector
    # (transaction duration histograms, service throughput, error rates)
    metrics/aggregated-metrics:
      receivers: [elasticapm]
      processors: []
      exporters: [elasticsearch/otel]

    # Logs + SCA library-loaded events: fan-out to connector + ES
    # elasticapm connector correlates logs with traces for Kibana
    logs/fromsdk:
      receivers: [otlp/fromsdk]
      processors: []
      exporters: [elasticapm, elasticsearch/otel]

  telemetry:
    logs:
      level: info
