# ============================================================
# docker-compose.yml
#
# Prerequisites:
#   1. cp sca-extension/docker/.env.example sca-extension/docker/.env
#      then fill in ELASTIC_ENDPOINT and ELASTIC_API_KEY
#   2. ./gradlew build -x test  (from repo root, to build the agent JAR)
#
# Run (from repo root):
#   docker compose -f sca-extension/docker/docker-compose.yml up --build
#
# ── Verify SCA events in Kibana (ES|QL) ──────────────────────────────
#
# All SCA events (library inventory):
#   FROM logs-generic.otel-default
#   | WHERE attributes.`event.name` == "co.elastic.otel.sca.library.loaded"
#   | WHERE resource.attributes.`service.name` == "spring-petclinic"
#   | KEEP attributes.`library.name`,
#           attributes.`library.version`,
#           attributes.`library.group_id`,
#           attributes.`library.purl`,
#           attributes.`library.sha256`,
#           attributes.`library.sha1`,
#           attributes.`library.license`,
#           attributes.`library.shaded`,
#           attributes.`library.module_type`,
#           attributes.`library.path`
#   | SORT attributes.`library.name` ASC
#
# Shaded/uber-JAR entries only:
#   FROM logs-generic.otel-default
#   | WHERE attributes.`event.name` == "co.elastic.otel.sca.library.loaded"
#   | WHERE attributes.`library.shaded` == true
#   | KEEP attributes.`library.name`, attributes.`library.version`,
#           attributes.`library.group_id`, attributes.`library.purl`
#   | SORT attributes.`library.name` ASC
#
# License inventory:
#   FROM logs-generic.otel-default
#   | WHERE attributes.`event.name` == "co.elastic.otel.sca.library.loaded"
#   | WHERE attributes.`library.license` IS NOT NULL
#   | STATS count = COUNT(*) BY attributes.`library.license`
#   | SORT count DESC
#
# Libraries with empty group_id (incomplete pURL):
#   FROM logs-generic.otel-default
#   | WHERE attributes.`event.name` == "co.elastic.otel.sca.library.loaded"
#   | WHERE attributes.`library.group_id` == ""
#   | KEEP attributes.`library.name`, attributes.`library.version`,
#           attributes.`library.purl`, attributes.`library.module_type`
#
# Total library count by module type:
#   FROM logs-generic.otel-default
#   | WHERE attributes.`event.name` == "co.elastic.otel.sca.library.loaded"
#   | STATS count = COUNT(*) BY attributes.`library.module_type`
#   | SORT count DESC
# ============================================================

services:

  # ---- EDOT Collector (elastic-agent in OTel mode) -----------
  collector:
    build:
      context: sca-extension/docker
      dockerfile: Dockerfile.collector
    image: edot-collector:latest
    container_name: edot-collector
    restart: unless-stopped
    command: ["--config", "/etc/otelcol-config.yml"]
    deploy:
      resources:
        limits:
          memory: 1.5G
    ports:
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP (EDOT Java default)
    environment:
      ELASTIC_AGENT_OTEL: "true"
      ELASTIC_ENDPOINT: "${ELASTIC_ENDPOINT}"
      ELASTIC_API_KEY: "${ELASTIC_API_KEY}"
      STORAGE_DIR: "/usr/share/elastic-agent"

  # ---- Load Generator ----------------------------------------
  load-generator:
    image: alpine:3.19
    container_name: edot-load-generator
    restart: unless-stopped
    depends_on:
      - petclinic
    command: >
      sh -c "
        echo 'Waiting for PetClinic to start...';
        sleep 20;
        echo 'Starting load generation...';
        while true; do
          wget -q -O /dev/null http://petclinic:8080/ || true;
          wget -q -O /dev/null http://petclinic:8080/owners || true;
          wget -q -O /dev/null 'http://petclinic:8080/owners?lastName=' || true;
          wget -q -O /dev/null http://petclinic:8080/vets.html || true;
          wget -q -O /dev/null http://petclinic:8080/owners/new || true;
          wget -q -O /dev/null 'http://petclinic:8080/owners/1' || true;
          wget -q -O /dev/null 'http://petclinic:8080/owners/1/pets/new' || true;
          wget -q -O /dev/null 'http://petclinic:8080/owners/2' || true;
          sleep 2;
        done
      "

  # ---- Spring PetClinic + EDOT Java Agent --------------------
  petclinic:
    build:
      context: .                          # repo root (needs agent JAR)
      dockerfile: sca-extension/docker/Dockerfile.java-app
    image: edot-petclinic:latest
    container_name: edot-petclinic
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - collector
    environment:
      # ── Required EDOT env vars ──────────────────────────────
      OTEL_SERVICE_NAME: "spring-petclinic"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://collector:4318"
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=docker-demo,service.version=3.3.0"

      # ── SCA extension — core ─────────────────────────────────
      ELASTIC_OTEL_SCA_ENABLED: "true"

      # Emit up to 50 library events/second during startup burst.
      # Lower this (e.g. 10) in production to reduce noise in the
      # logs pipeline; raise it (e.g. 200) in CI/CD scans.
      ELASTIC_OTEL_SCA_JARS_PER_SECOND: "50"

      # Hard cap: stop after 5000 unique JARs per JVM lifetime.
      ELASTIC_OTEL_SCA_MAX_JARS_TOTAL: "5000"

      # ── SCA extension — discovery ────────────────────────────
      # Scan java.class.path and ManagementFactory classpath before
      # the ClassFileTransformer registers (catches never-loaded JARs).
      ELASTIC_OTEL_SCA_SCAN_STARTUP_CLASSPATH: "true"

      # Follow MANIFEST.MF Class-Path entries one level deep.
      ELASTIC_OTEL_SCA_FOLLOW_MANIFEST_CLASSPATH: "true"

      # Emit one library.loaded event per library embedded inside
      # shaded/uber-JARs (multiple pom.properties in one JAR).
      ELASTIC_OTEL_SCA_DETECT_SHADED_JARS: "true"

      # Re-scan known classloaders every 60 s for dynamically loaded JARs.
      ELASTIC_OTEL_SCA_REHARVEST_INTERVAL_SECONDS: "60"

      # ── SCA extension — filtering ─────────────────────────────
      # Skip JARs under java.io.tmpdir (e.g. /tmp/undertow-*, JRebel).
      ELASTIC_OTEL_SCA_SKIP_TEMP_JARS: "true"

      # Skip *-tests.jar and *-test.jar files (no executable code).
      ELASTIC_OTEL_SCA_SKIP_TEST_JARS: "true"

      # OTEL_TRACES_EXPORTER / METRICS / LOGS intentionally omitted —
      # EDOT defaults already export all signals via OTLP.
